<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>README Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css" />
    <style>
      :root {
        color-scheme: light;
        --page-bg: #efe6da;
        --wall: radial-gradient(circle at top left, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.22) 46%, transparent 60%), linear-gradient(135deg, #f2eadf 0%, #f8f4ee 45%, #e5efe6 100%);
        --card: rgba(255, 252, 248, 0.94);
        --line: #c5b29a;
        --ink: #2d221a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--wall);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
      }

      .frame {
        max-width: 1180px;
        margin: 32px auto;
        padding: 0 20px 48px;
      }

      .hero {
        margin-bottom: 22px;
        text-align: center;
      }

      .hero h1 {
        margin: 0;
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(2.2rem, 3.6vw, 4rem);
        line-height: 1.02;
        color: #2a2019;
      }

      .hero p {
        margin: 12px auto 0;
        max-width: 760px;
        font-size: 1.05rem;
        color: #5e4f42;
      }

      .sheet {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 22px 60px rgba(86, 60, 37, 0.14);
        overflow: hidden;
      }

      .sheet-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(197, 178, 154, 0.7);
        background: rgba(255, 249, 243, 0.95);
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
      }

      .dot.one { background: #be5b42; }
      .dot.two { background: #d29a45; }
      .dot.three { background: #628356; }

      .sheet-title {
        margin-left: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #6d5a4a;
      }

      .markdown-body {
        max-width: none;
        margin: 0;
        padding: 32px clamp(20px, 4vw, 46px) 40px;
        background: transparent;
        color: var(--ink);
        font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        font-family: "Fraunces", Georgia, serif;
        letter-spacing: 0;
      }

      .markdown-body h1 {
        border-bottom: 0;
      }

      .markdown-body h2 {
        border-bottom-color: rgba(197, 178, 154, 0.75);
        padding-bottom: 0.28em;
      }

      .markdown-body p,
      .markdown-body li {
        font-size: 1rem;
        line-height: 1.7;
      }

      .markdown-body code,
      .markdown-body pre code {
        font-family: "IBM Plex Sans", Consolas, monospace;
      }

      .markdown-body blockquote {
        color: #6f5a48;
        border-left-color: #b2875b;
        background: rgba(255, 247, 238, 0.9);
        border-radius: 0 8px 8px 0;
        padding: 8px 16px;
      }

      .status {
        padding: 24px 28px;
        font-size: 1rem;
        color: #6f5a48;
      }

      .error {
        color: #8b2e1f;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="hero">
        <h1>README Preview</h1>
        <p>The actual repository file, rendered locally so you can judge it like a serious person and not by staring at raw markdown.</p>
      </div>
      <div class="sheet">
        <div class="sheet-bar">
          <div class="dot one"></div>
          <div class="dot two"></div>
          <div class="dot three"></div>
          <div class="sheet-title">ISH Front Desk Allocator / README.md</div>
        </div>
        <article id="content" class="markdown-body">
          <div class="status">Loading README. Please remain calm and do not schedule anyone manually.</div>
        </article>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      fetch("./README.md")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Could not load README.md");
          }
          return response.text();
        })
        .then((markdown) => {
          const content = document.getElementById("content");
          content.innerHTML = marked.parse(markdown);
          content.querySelectorAll("a[href^='http']").forEach((link) => {
            link.target = "_blank";
            link.rel = "noreferrer";
          });
        })
        .catch((error) => {
          document.getElementById("content").innerHTML =
            '<div class="status error">README preview failed to load. Very dramatic. ' +
            error.message +
            "</div>";
        });
    </script>
  </body>
</html>
