services:
  - type: web
    name: ish-front-desk-allocator
    runtime: docker
    plan: free
    region: virginia
    healthCheckPath: /api/healthz
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ish-front-desk-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERS_JSON
        sync: false

databases:
  - name: ish-front-desk-db
    plan: free
    region: virginia
    databaseName: fd_allocator
    user: fd_admin
