  <text x="1028" y="524" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#6b5a4d">
    Also suitable for dorm desks, labs, events, clinics, volunteer rosters,
  </text>
  <text x="1028" y="552" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#6b5a4d">
