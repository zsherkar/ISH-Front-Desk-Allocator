<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-label="ISH Front Desk Allocator banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efe5"/>
      <stop offset="52%" stop-color="#f8f4ee"/>
      <stop offset="100%" stop-color="#e7efe8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#f3ebe0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#6b3f22" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="640" fill="url(#bg)"/>
  <circle cx="1442" cy="110" r="142" fill="#d9e8da" opacity="0.48"/>
  <circle cx="172" cy="538" r="182" fill="#e9d8c0" opacity="0.52"/>

  <rect x="72" y="64" width="1456" height="512" rx="28" fill="url(#card)" stroke="#c7b7a3" stroke-width="2" filter="url(#shadow)"/>

  <rect x="108" y="110" width="394" height="92" rx="18" fill="#234c4a"/>
  <text x="132" y="153" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#f9f3ea">INTERNATIONAL STUDENT HOUSE</text>
  <text x="132" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="#d8eceb">Washington, DC origins. Everyone else is invited too.</text>

  <text x="108" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#2b2119">ISH Front Desk Allocator</text>
  <text x="108" y="350" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="600" fill="#7a3d1f">
    Open-source shift scheduling for teams one spreadsheet away from collapse.
  </text>
  <text x="108" y="406" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#53453b">
    Surveys. Fair allocation. Admin overrides. Printable exports. Less ceremonial suffering.
  </text>

  <rect x="106" y="458" width="178" height="50" rx="14" fill="#8b2e1f"/>
  <text x="136" y="491" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#fffaf5">SURVEY</text>
  <rect x="304" y="458" width="198" height="50" rx="14" fill="#234c4a"/>
  <text x="336" y="491" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#fffaf5">ALLOCATE</text>
  <rect x="522" y="458" width="176" height="50" rx="14" fill="#6c8a3a"/>
  <text x="554" y="491" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#fffaf5">EXPORT</text>
  <rect x="718" y="458" width="160" height="50" rx="14" fill="#c18d4b"/>
  <text x="751" y="491" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#fffaf5">BREATHE</text>

  <rect x="1008" y="126" width="438" height="346" rx="22" fill="#fffefb" stroke="#bda890" stroke-width="2"/>
  <rect x="1036" y="156" width="382" height="48" rx="12" fill="#9dc3e6"/>
  <text x="1160" y="187" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#24313a">MONTHLY SHIFT FLOW</text>

  <rect x="1036" y="226" width="90" height="42" rx="8" fill="#f4b183"/>
  <rect x="1138" y="226" width="90" height="42" rx="8" fill="#f4b183"/>
  <rect x="1240" y="226" width="90" height="42" rx="8" fill="#f4b183"/>
  <rect x="1342" y="226" width="76" height="42" rx="8" fill="#f4b183"/>

  <text x="1061" y="253" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#5b2a12">COLLECT</text>
  <text x="1168" y="253" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#5b2a12">REVIEW</text>
  <text x="1267" y="253" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#5b2a12">ASSIGN</text>
  <text x="1361" y="253" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#5b2a12">SHIP</text>

  <rect x="1036" y="286" width="178" height="56" rx="14" fill="#70ad47"/>
  <text x="1077" y="321" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#fffdf8">availability</text>
  <rect x="1240" y="286" width="178" height="56" rx="14" fill="#234c4a"/>
  <text x="1285" y="321" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#fffdf8">allocation</text>

  <path d="M1218 314 L1236 314" stroke="#8b7a66" stroke-width="6" stroke-linecap="round"/>
  <path d="M1228 304 L1238 314 L1228 324" fill="none" stroke="#8b7a66" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1038 368)">
    <rect x="0" y="0" width="380" height="74" rx="16" fill="#fbf7f1" stroke="#d7c8b5"/>
    <rect x="18" y="18" width="56" height="38" rx="9" fill="#8b2e1f"/>
    <rect x="86" y="18" width="82" height="14" rx="7" fill="#d9c4aa"/>
    <rect x="86" y="42" width="130" height="10" rx="5" fill="#e9ddcf"/>
    <rect x="238" y="18" width="54" height="38" rx="9" fill="#234c4a"/>
    <rect x="304" y="18" width="58" height="38" rx="9" fill="#6c8a3a"/>
  </g>

  <text x="1008" y="524" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#6b5a4d">
    Also suitable for dorm desks, labs, events, clinics, volunteer rosters,
  </text>
  <text x="1008" y="552" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#6b5a4d">
    fellowships, and any operation currently surviving on courage and a sheet named "FINAL_final_v6".
  </text>
